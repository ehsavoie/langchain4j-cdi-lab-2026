<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Interface de Débogage</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        #log { border: 1px solid #00ff00; padding: 10px; margin: 10px 0; height: 400px; overflow-y: auto; background: #000; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; }
        input { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; width: 500px; }
        .timestamp { color: #666; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #00aaff; }
    </style>
</head>
<body>
    <h1>Interface de Débogage - Test API</h1>

    <div>
        <button onclick="testHealth()">Tester Santé</button>
        <button onclick="testStart()">Tester Démarrage</button>
        <button onclick="testPlay()">Tester Jeu</button>
        <button onclick="clearLog()">Effacer</button>
    </div>

    <div>
        <input type="text" id="customMsg" placeholder="Message personnalisé" value="Lance les runes">
        <button onclick="testCustom()">Envoyer</button>
    </div>

    <div id="log"></div>

    <script>
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = type;
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testHealth() {
            log('Test de /api/game/health...', 'info');
            try {
                const resp = await fetch('api/game/health');
                const text = await resp.text();
                log(`OK Santé OK : ${text}`, 'success');
            } catch (e) {
                log(`ÉCHEC Erreur santé : ${e.message}`, 'error');
            }
        }

        async function testStart() {
            log('Test de /api/game/start...', 'info');
            try {
                const start = Date.now();
                const resp = await fetch('api/game/start');
                const text = await resp.text();
                const duration = Date.now() - start;
                log(`OK Démarrage OK (${duration}ms)`, 'success');
                log(`Réponse : ${text.substring(0, 200)}...`, 'info');
            } catch (e) {
                log(`ÉCHEC Erreur démarrage : ${e.message}`, 'error');
            }
        }

        async function testPlay() {
            log('Test de /api/game/play avec "Lance les runes"...', 'info');
            try {
                const start = Date.now();
                const resp = await fetch('api/game/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: 'Lance les runes'
                });
                const text = await resp.text();
                const duration = Date.now() - start;
                log(`OK Jeu OK (${duration}ms)`, 'success');
                log(`Réponse : ${text}`, 'info');
            } catch (e) {
                log(`ÉCHEC Erreur jeu : ${e.message}`, 'error');
            }
        }

        async function testCustom() {
            const msg = document.getElementById('customMsg').value;
            log(`Test de /api/game/play avec "${msg}"...`, 'info');
            try {
                const start = Date.now();
                const resp = await fetch('api/game/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: msg
                });
                const text = await resp.text();
                const duration = Date.now() - start;
                log(`OK Personnalisé OK (${duration}ms)`, 'success');
                log(`Réponse : ${text}`, 'info');
            } catch (e) {
                log(`ÉCHEC Erreur personnalisé : ${e.message}`, 'error');
            }
        }

        // Test automatique au chargement
        window.addEventListener('load', () => {
            log('=== Interface de Débogage Chargée ===', 'success');
            log('Cliquez sur les boutons pour tester les endpoints', 'info');
        });
    </script>
</body>
</html>
